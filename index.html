<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Daly Family Tree</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&display=swap" rel="stylesheet">
</head>
<body>
<header class="app">
  <div class="topbar">
    <div class="topbar-leading">
      <div class="brand">
        <span class="eyebrow">Family Tree · Five Generations</span>
        <h1>Daly</h1>
        <p class="persona-subtitle" id="personaSubtitle" hidden></p>
      </div>
      <div class="topbar-actions">
        <button type="button" class="persona-toggle" id="personaToggle" aria-expanded="false" aria-controls="personaWrap" aria-haspopup="listbox" aria-label="Choose viewer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M5 20v-1a7 7 0 0114 0v1"/></svg>
        </button>
        <button type="button" class="search-toggle" id="searchToggle" aria-expanded="false" aria-controls="searchInput" aria-label="Open search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        </button>
      </div>
    </div>
    <div class="persona-wrap" id="personaWrap">
      <label class="persona-label" for="personaSelect">View as</label>
      <select id="personaSelect" class="persona-select" aria-label="Choose whose perspective to view the tree"></select>
    </div>
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input id="searchInput" type="text" placeholder="Search by name…" autocomplete="off" spellcheck="false" aria-expanded="false" aria-controls="searchResults" aria-autocomplete="list">
      <span class="count" id="searchCount"></span>
      <ul id="searchResults" class="search-results" role="listbox" hidden></ul>
    </div>
    <div class="controls">
      <button class="ctrl" id="zoomOut" title="Zoom out">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/></svg>
      </button>
      <button class="ctrl" id="zoomReset" title="Fit to screen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9V5a2 2 0 0 1 2-2h4M21 9V5a2 2 0 0 0-2-2h-4M3 15v4a2 2 0 0 0 2 2h4M21 15v4a2 2 0 0 1-2 2h-4"/></svg>
      </button>
      <button class="ctrl" id="zoomIn" title="Zoom in">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>
  </div>
</header>

<!-- ===== Desktop stage ===== -->
<div class="stage" id="stage">
  <div class="canvas" id="canvas">
    <svg class="connectors" id="connectors"></svg>
    <!-- cards injected here -->
  </div>
</div>
<div class="pan-hint" id="panHint">drag to pan · scroll to zoom</div>

<aside class="legend" aria-label="Legend">
  <div class="title">Family Lines</div>
  <ul>
    <li><span class="sw" style="background:var(--c-daly)"></span>Daly · Barry</li>
    <li><span class="sw" style="background:var(--c-curran)"></span>Curran · McCarthy</li>
    <li><span class="sw" style="background:var(--c-byron)"></span>Byron</li>
    <li><span class="sw" style="background:var(--c-barrett)"></span>Barrett · Scott</li>
    <li><span class="sw" style="background:var(--c-joanne)"></span>Joanne</li>
    <li><span class="sw" style="background:var(--c-kieran)"></span>Cummins</li>
  </ul>
</aside>

<!-- ===== Mobile view ===== -->
<div class="mobile-view" id="mobileView"></div>

<!-- ===== Detail panel ===== -->
<div class="scrim" id="scrim"></div>
<aside class="panel" id="panel" aria-hidden="true">
  <header>
    <div>
      <span class="line-tag" id="panelLineTag">Family Line</span>
      <h2 id="panelName">—</h2>
    </div>
    <button class="close" id="panelClose" aria-label="Close">×</button>
  </header>
  <div class="body" id="panelBody"></div>
</aside>
<script type="module" src="/src/main.js"></script>
</body>
</html>
