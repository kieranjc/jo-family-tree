<style>
  :root {
    --bg: #f8f4ef;
    --bg-deep: #f1ebe1;
    --ink: #2a2620;
    --ink-soft: #6b6358;
    --rule: #d9cfbf;
    --rule-soft: #e8dfd0;
    --card: #fffdf8;
    --shadow: 0 1px 0 rgba(42,38,32,.04), 0 6px 18px -8px rgba(42,38,32,.18);
    --shadow-lift: 0 2px 0 rgba(42,38,32,.06), 0 18px 40px -10px rgba(42,38,32,.28);

    --c-daly: #b45309;       /* warm amber */
    --c-daly-bg: #fbeed4;
    --c-curran: #2f7a3f;     /* green */
    --c-curran-bg: #dcecdb;
    --c-byron: #1e57a8;      /* blue */
    --c-byron-bg: #dde7f4;
    --c-barrett: #6b3fa0;    /* purple */
    --c-barrett-bg: #e6dcef;
    --c-joanne: #b08300;     /* gold */
    --c-joanne-bg: #f6e9bd;
    --c-kieran: #5b5751;     /* grey */
    --c-kieran-bg: #e3ded6;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: Georgia, 'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Subtle parchment grain */
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background-image:
      radial-gradient(rgba(110,90,60,0.04) 1px, transparent 1px),
      radial-gradient(rgba(110,90,60,0.03) 1px, transparent 1px);
    background-size: 3px 3px, 7px 7px;
    background-position: 0 0, 1px 2px;
    z-index: 1;
  }

  /* ===== Header / Toolbar ===== */
  header.app {
    position: sticky; top: 0; z-index: 30;
    background: rgba(248,244,239,0.92);
    backdrop-filter: saturate(140%) blur(8px);
    -webkit-backdrop-filter: saturate(140%) blur(8px);
    border-bottom: 1px solid var(--rule);
  }
  .topbar {
    display: flex; align-items: center; gap: 18px;
    padding: 14px 22px;
    max-width: 100%;
  }
  .brand {
    display: flex; flex-direction: column; line-height: 1.15;
    flex-shrink: 0;
  }
  .brand .eyebrow {
    font-size: 10.5px; letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  }
  .brand h1 {
    margin: 2px 0 0;
    font-size: 20px;
    font-weight: 400;
    font-style: italic;
    letter-spacing: 0.005em;
  }
  .search {
    flex: 1;
    max-width: 420px;
    position: relative;
  }
  .search input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 999px;
    padding: 9px 14px 9px 38px;
    font: inherit;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .search input:focus {
    border-color: #a89580;
    box-shadow: 0 0 0 3px rgba(168,149,128,0.18);
  }
  .search svg {
    position: absolute;
    left: 13px; top: 50%; transform: translateY(-50%);
    width: 15px; height: 15px;
    color: var(--ink-soft);
  }
  .search .count {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    font-size: 11px;
    color: var(--ink-soft);
    font-family: ui-monospace, monospace;
  }
  .controls {
    display: flex; gap: 6px;
    flex-shrink: 0;
  }
  .ctrl {
    background: var(--card);
    border: 1px solid var(--rule);
    color: var(--ink);
    width: 34px; height: 34px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 8px;
    cursor: pointer;
    font: inherit;
    font-size: 16px;
    transition: background .15s, transform .15s;
  }
  .ctrl:hover { background: var(--bg-deep); }
  .ctrl:active { transform: scale(0.94); }
  .ctrl svg { width: 16px; height: 16px; }

  /* ===== Stage (desktop) ===== */
  .stage {
    position: relative;
    flex: 1;
    overflow: hidden;
    cursor: grab;
    z-index: 2;
  }
  .stage.grabbing { cursor: grabbing; }
  .canvas {
    position: absolute;
    top: 0; left: 0;
    transform-origin: 0 0;
    will-change: transform;
  }

  /* Generation rail */
  .gen-rail {
    position: absolute;
    left: 0; top: 0;
    width: 130px;
    height: 100%;
    pointer-events: none;
    z-index: 5;
  }
  .gen-label {
    position: absolute;
    left: 14px;
    transform: translateY(-50%);
    font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    font-size: 10.5px;
    letter-spacing: 0.18em;
    color: var(--ink-soft);
    text-transform: uppercase;
    pointer-events: auto;
    background: var(--bg);
    padding: 4px 8px;
    border: 1px solid var(--rule-soft);
    border-radius: 4px;
  }
  .gen-label .num {
    display: block;
    font-size: 22px;
    font-style: italic;
    font-family: Georgia, serif;
    color: var(--ink);
    letter-spacing: 0;
    text-transform: none;
    line-height: 1;
    margin-bottom: 4px;
  }
  .gen-line {
    position: absolute;
    left: 130px; right: 0;
    height: 1px;
    background: var(--rule-soft);
    pointer-events: none;
  }

  /* ===== Person card ===== */
  .card {
    position: absolute;
    width: 168px;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 10px;
    padding: 11px 13px 12px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: transform .15s ease, box-shadow .15s ease, opacity .25s, filter .25s;
    z-index: 10;
  }
  .card::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    border-radius: 10px 0 0 10px;
    background: var(--accent, var(--rule));
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-lift);
  }
  .card.deceased { opacity: 0.94; }
  .card.dimmed { opacity: 0.18; filter: saturate(0.4); }
  .card.match {
    box-shadow: 0 0 0 2px var(--c-joanne), var(--shadow-lift);
    z-index: 12;
  }
  .card.focused {
    box-shadow: 0 0 0 2px var(--ink), var(--shadow-lift);
    z-index: 13;
  }
  .card .name {
    font-size: 14.5px;
    line-height: 1.2;
    font-weight: 400;
    color: var(--ink);
    margin-bottom: 4px;
    text-wrap: balance;
  }
  .card .meta {
    font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    font-size: 10.5px;
    color: var(--ink-soft);
    letter-spacing: 0.02em;
    line-height: 1.45;
  }
  .card .meta .dash { color: var(--rule); margin: 0 4px; }
  .card.compact { width: 140px; padding: 9px 11px 10px; }
  .card.compact .name { font-size: 13px; }

  .card .badge {
    display: inline-block;
    font-family: ui-monospace, monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-bg);
    padding: 2px 6px;
    border-radius: 3px;
    margin-bottom: 6px;
  }

  /* Couple marriage marker — small linked icon between two cards */
  .marriage-marker {
    position: absolute;
    width: 14px; height: 14px;
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 50%;
    z-index: 11;
    transform: translate(-50%, -50%);
    display: flex; align-items: center; justify-content: center;
  }
  .marriage-marker::after {
    content: "";
    width: 5px; height: 5px;
    background: var(--ink-soft);
    border-radius: 50%;
  }

  /* SVG connector layer */
  svg.connectors {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 2;
    overflow: visible;
  }
  svg.connectors path { fill: none; }
  svg.connectors path.parent { stroke: #b9ad9b; stroke-width: 1.4; }
  svg.connectors path.couple { stroke: #b9ad9b; stroke-width: 1.4; stroke-dasharray: 4 3; }

  /* Sibling cluster — uncles/aunts */
  .siblings {
    position: absolute;
    background: var(--bg-deep);
    border: 1px dashed var(--rule);
    border-radius: 8px;
    padding: 8px 10px 10px;
    z-index: 9;
  }
  .siblings .title {
    font-family: ui-monospace, monospace;
    font-size: 9.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .siblings .chips {
    display: flex; flex-wrap: wrap; gap: 5px;
    max-width: 220px;
  }
  .chip {
    background: var(--card);
    border: 1px solid var(--rule-soft);
    border-radius: 4px;
    padding: 4px 7px;
    font-size: 12px;
    color: var(--ink);
    cursor: pointer;
    border-left: 3px solid var(--accent, var(--rule));
    transition: background .15s;
  }
  .chip:hover { background: var(--bg); }

  /* Joanne crown badge */
  .card.you {
    background: linear-gradient(180deg, #fff9e6 0%, #fffdf8 60%);
  }

  /* ===== Legend ===== */
  .legend {
    position: fixed;
    right: 18px; bottom: 18px;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 10px;
    padding: 12px 14px;
    box-shadow: var(--shadow);
    z-index: 20;
    max-width: 220px;
    font-size: 12px;
  }
  .legend .title {
    font-family: ui-monospace, monospace;
    font-size: 9.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .legend ul { margin: 0; padding: 0; list-style: none; display: grid; grid-template-columns: 1fr 1fr; gap: 4px 10px; }
  .legend li { display: flex; align-items: center; gap: 6px; line-height: 1.3; }
  .legend .sw { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  /* ===== Detail panel ===== */
  .scrim {
    position: fixed; inset: 0;
    background: rgba(42,38,32,0.18);
    z-index: 40;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
  }
  .scrim.show { opacity: 1; pointer-events: auto; }
  .panel {
    position: fixed;
    top: 0; right: 0;
    height: 100vh;
    width: 380px;
    max-width: 92vw;
    background: var(--card);
    border-left: 1px solid var(--rule);
    box-shadow: -20px 0 60px -20px rgba(42,38,32,0.25);
    z-index: 41;
    transform: translateX(100%);
    transition: transform .35s cubic-bezier(.2,.7,.2,1);
    display: flex; flex-direction: column;
  }
  .panel.show { transform: translateX(0); }
  .panel header {
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--rule-soft);
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 10px;
  }
  .panel .line-tag {
    display: inline-block;
    font-family: ui-monospace, monospace;
    font-size: 9.5px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-bg);
    padding: 3px 7px;
    border-radius: 3px;
    margin-bottom: 8px;
  }
  .panel h2 {
    font-size: 26px;
    font-weight: 400;
    margin: 0;
    line-height: 1.15;
    font-style: italic;
    letter-spacing: -0.005em;
  }
  .panel .close {
    background: none;
    border: 1px solid var(--rule);
    border-radius: 6px;
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--ink-soft);
    font-size: 18px;
    flex-shrink: 0;
  }
  .panel .close:hover { background: var(--bg-deep); }
  .panel .body {
    padding: 18px 22px 24px;
    overflow-y: auto;
    flex: 1;
  }
  .field {
    margin-bottom: 16px;
  }
  .field .label {
    font-family: ui-monospace, monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 3px;
  }
  .field .val {
    font-size: 15.5px;
    line-height: 1.4;
    color: var(--ink);
  }
  .field .val.muted { color: var(--ink-soft); font-style: italic; }
  .field.relation .val {
    font-style: italic;
    color: var(--ink);
    padding: 10px 12px;
    background: var(--bg);
    border-left: 3px solid var(--accent, var(--rule));
    border-radius: 0 6px 6px 0;
    font-size: 14.5px;
  }
  .field.bio .val.bio-body {
    font-size: 14px;
    line-height: 1.55;
    color: #3a342c;
  }
  .field.bio .val.bio-body p {
    margin: 0 0 12px;
    text-wrap: pretty;
  }
  .field.bio .val.bio-body p:last-child { margin-bottom: 0; }
  .field.bio .val.bio-body strong {
    font-weight: 400;
    color: var(--ink);
    box-shadow: inset 0 -0.4em 0 var(--accent-bg);
    padding: 0 1px;
  }
  .field.bio .val.bio-body em {
    color: var(--ink-soft);
  }

  /* Tiny "has bio" dot on the card */
  .card.has-bio .name::after {
    content: "";
    display: inline-block;
    width: 5px; height: 5px;
    background: var(--accent);
    border-radius: 50%;
    margin-left: 6px;
    vertical-align: 2px;
    opacity: 0.85;
  }
  .mcard.has-bio .name::after,
  .mchip.has-bio::after {
    content: "";
    display: inline-block;
    width: 5px; height: 5px;
    background: var(--accent);
    border-radius: 50%;
    margin-left: 6px;
    vertical-align: 2px;
  }
  .lifespan {
    display: inline-flex; align-items: baseline; gap: 8px;
    font-family: ui-monospace, monospace;
    font-size: 13px;
  }
  .lifespan .yr { color: var(--ink); }
  .lifespan .sep { color: var(--rule); }

  /* Empty hint */
  .pan-hint {
    position: fixed;
    left: 50%; bottom: 18px;
    transform: translateX(-50%);
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 999px;
    padding: 7px 14px;
    font-size: 12px;
    color: var(--ink-soft);
    z-index: 20;
    font-family: ui-monospace, monospace;
    letter-spacing: 0.04em;
    box-shadow: var(--shadow);
    opacity: 0;
    transition: opacity .4s;
    pointer-events: none;
  }
  .pan-hint.show { opacity: 1; }

  /* ===== Mobile vertical view ===== */
  .mobile-view {
    display: none;
    padding: 16px 14px 80px;
    z-index: 2;
    position: relative;
  }
  .gen-section {
    margin-bottom: 18px;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 12px;
    overflow: hidden;
    scroll-margin-top: 72px;
  }
  .gen-section > button.gen-toggle {
    width: 100%;
    background: var(--bg-deep);
    border: 0;
    border-bottom: 1px solid var(--rule);
    padding: 13px 16px;
    text-align: left;
    cursor: pointer;
    font: inherit;
    display: flex; justify-content: space-between; align-items: center;
    color: var(--ink);
  }
  .gen-section.collapsed > button.gen-toggle { border-bottom: 0; }
  .gen-toggle .gtitle {
    display: flex; flex-direction: column;
    line-height: 1.2;
  }
  .gen-toggle .gtitle .gnum {
    font-family: ui-monospace, monospace;
    font-size: 10px; letter-spacing: 0.18em;
    color: var(--ink-soft); text-transform: uppercase;
    margin-bottom: 2px;
  }
  .gen-toggle .gtitle .gname {
    font-size: 16px;
    font-style: italic;
  }
  .gen-toggle .gcount {
    font-family: ui-monospace, monospace;
    font-size: 11px;
    color: var(--ink-soft);
  }
  .gen-toggle .caret {
    display: inline-block;
    transition: transform .2s;
    margin-left: 8px;
    color: var(--ink-soft);
  }
  .gen-section.collapsed .caret { transform: rotate(-90deg); }
  .gen-section.collapsed .gen-body { display: none; }
  .gen-body {
    padding: 12px;
    display: grid;
    gap: 10px;
  }
  .mcard {
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 10px;
    padding: 11px 13px;
    cursor: pointer;
    border-left: 4px solid var(--accent, var(--rule));
    transition: background .15s;
  }
  .mcard:active { background: var(--bg); }
  .mcard.match { box-shadow: 0 0 0 2px var(--c-joanne); }
  .mcard .name { font-size: 15px; margin-bottom: 3px; }
  .mcard .meta {
    font-family: ui-monospace, monospace;
    font-size: 10.5px;
    color: var(--ink-soft);
  }
  .mcouple {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    align-items: stretch;
  }
  .mcouple .between {
    grid-column: 1 / -1;
    text-align: center;
    font-family: ui-monospace, monospace;
    font-size: 9.5px;
    letter-spacing: 0.2em;
    color: var(--ink-soft);
    text-transform: uppercase;
    margin-top: -4px;
    margin-bottom: -4px;
  }
  .mchips {

  coupleGap: 36, // horizontal gap between two cards in a couple
  siblingGap: 12,
};

const GEN_LABELS = [
  { num: 'I',   label: 'You' },
  { num: 'II',  label: 'Parents' },
  { num: 'III', label: 'Grandparents' },
  { num: 'IV',  label: 'Great-grandparents' },
  { num: 'V',   label: '2× Great-grandparents' },
];

// Build position lookup. Strategy: place gen-4 evenly. Each couple at gen-4 centers under a gen-3 person.
// Then gen-3 couples' midpoints define gen-2 person positions, etc.
// We compute x positions per id.
const POS = {}; // id -> {x, y}

(function computeLayout(){
  const { cardW, cardH, rowGap, topPad, leftPad, coupleGap } = LAYOUT;
  const rowY = g => topPad + g * rowGap + (4 - g) * 0; // top-down: gen 4 at top, gen 0 at bottom?
  // Actually: gen 0 at bottom (You), gen 4 at top. So y for gen g = topPad + (4 - g) * rowGap
  const y = g => topPad + (4 - g) * rowGap;

  // ----- Gen 4: order matters left-to-right
  const g4Order = [
    // Daly side
    'g4_mathew_daly', 'g4_mary_horgan',         // -> ggp_patrick_daly
    'g4_richard_barry', 'g4_mary_horrigan',     // -> ggp_mary_barry
    'g4_michael_curran', 'g4_ellen_brien',      // -> ggp_william_curran
    'g4_humphrey_mcc',   'g4_mary_hegarty',     // -> ggp_thomasine_mcc
    // Byron side has no gen-4; skip (we'll leave a gap above gen-3 Byron couple)
    'g4_joseph_barrett', 'g4_julia_crockett',   // -> ggp_george_barrett
    'g4_alexander_scott','g4_alice_flynn',      // -> ggp_margaret_scott
  ];
  // Group by couple
  const g4Couples = [
    ['g4_mathew_daly','g4_mary_horgan'],
    ['g4_richard_barry','g4_mary_horrigan'],
    ['g4_michael_curran','g4_ellen_brien'],
    ['g4_humphrey_mcc','g4_mary_hegarty'],
    null, // Byron gap
    null, // Byron gap
    ['g4_joseph_barrett','g4_julia_crockett'],
    ['g4_alexander_scott','g4_alice_flynn'],
  ];

  const coupleW = cardW * 2 + coupleGap;
  const interCoupleGap = 36;
  let cursorX = leftPad;
  // Place each couple slot, including the empty Byron slots
  const slotCenters = []; // x center for each gen-3 person (in same order as g4Couples)
  for (let i = 0; i < g4Couples.length; i++) {
    const couple = g4Couples[i];
    const slotX = cursorX;
    const centerX = slotX + coupleW / 2;
    slotCenters.push(centerX);
    if (couple) {
      POS[couple[0]] = { x: slotX, y: y(4) };
      POS[couple[1]] = { x: slotX + cardW + coupleGap, y: y(4) };
    }
    cursorX += coupleW + interCoupleGap;
  }

  // ----- Gen 3: each gen-3 person centered on their parents' couple slot
  // Order: ggp_patrick_daly, ggp_mary_barry, ggp_william_curran, ggp_thomasine_mcc,
  //        ggp_frederick_byron, ggp_florence_ritchie, ggp_george_barrett, ggp_margaret_scott
  const g3Order = [
    'ggp_patrick_daly', 'ggp_mary_barry',
    'ggp_william_curran', 'ggp_thomasine_mcc',
    'ggp_frederick_byron', 'ggp_florence_ritchie',
    'ggp_george_barrett', 'ggp_margaret_scott',
  ];
  for (let i = 0; i < 8; i++) {
    const id = g3Order[i];
    const cx = slotCenters[i];
    POS[id] = { x: cx - cardW / 2, y: y(3) };
  }

  // ----- Gen 2: each grandparent centered between their two gen-3 parents
  // Pairs of gen-3 → gen-2 grandparent:
  const g2Map = [
    { gp: 'gp_michael_daly',  ps: ['ggp_patrick_daly', 'ggp_mary_barry'] },
    { gp: 'gp_mary_curran',   ps: ['ggp_william_curran', 'ggp_thomasine_mcc'] },
    { gp: 'gp_james_byron',   ps: ['ggp_frederick_byron', 'ggp_florence_ritchie'] },
    { gp: 'gp_nora_barrett',  ps: ['ggp_george_barrett', 'ggp_margaret_scott'] },
  ];
  g2Map.forEach(({gp, ps}) => {
    const cxA = POS[ps[0]].x + cardW/2;
    const cxB = POS[ps[1]].x + cardW/2;
    const cx = (cxA + cxB) / 2;
    POS[gp] = { x: cx - cardW/2, y: y(2) };
  });

  // ----- Gen 1: John between Michael+Mary Curran; Joan between James+Nora
  const g1Map = [
    { p: 'john_daly',  parents: ['gp_michael_daly', 'gp_mary_curran'] },
    { p: 'joan_byron', parents: ['gp_james_byron', 'gp_nora_barrett'] },
  ];
  g1Map.forEach(({p, parents}) => {
    const cxA = POS[parents[0]].x + cardW/2;
    const cxB = POS[parents[1]].x + cardW/2;
    const cx = (cxA + cxB) / 2;
    POS[p] = { x: cx - cardW/2, y: y(1) };
  });

  // ----- Gen 0: Joanne + Kieran couple, centered on John+Joan midpoint
  const johnCX = POS['john_daly'].x + cardW/2;
  const joanCX = POS['joan_byron'].x + cardW/2;
  const parentMidX = (johnCX + joanCX) / 2;
  // place Joanne+Kieran as a couple centered around parentMidX
  POS['joanne'] = { x: parentMidX - cardW - coupleGap/2, y: y(0) };
  POS['kieran'] = { x: parentMidX + coupleGap/2,         y: y(0) };

  // ----- Siblings placed in a row below Joanne row (right of Kieran)
  // Actually let's put them in a tidy block at the right, same gen-0 row,
  // but using compact cards so they fit. We'll use a separate cluster placement
  // computed by render. We DO need positions for connector parents though.
  // The siblings will be drawn as a "siblings" cluster; we'll lay them out in render.

  // We'll also compute uncles/aunts cluster positions in render — they don't need
  // individual POS entries since they're chips inside cluster boxes.
})();

/* ============================================================
   RENDER
   ============================================================ */
const stage = document.getElementById('stage');
const canvas = document.getElementById('canvas');
const svg = document.getElementById('connectors');

function fmtName(p) { return p.name; }
function lifespan(p) {
  if (!p.dob && !p.dod) return '';
  const dob = p.dob || '?';
  const dod = p.dod || (p.gen === 0 || p.gen === 1 ? '' : '');
  if (p.dod) return `${dob} – ${p.dod}`;
  if (p.dob) return `b. ${p.dob}`;
  return '';
}

function cardHTML(p, opts = {}) {
  const cls = ['card', `line-${p.line}`];
  if (p.dod) cls.push('deceased');
  if (p.id === 'joanne') cls.push('you');
  if (opts.compact) cls.push('compact');
  if (BIOS[p.id]) cls.push('has-bio');
  const meta = [];
  if (p.dob) meta.push(p.dob);
  if (p.birthplace) meta.push(p.birthplace);
  if (p.dod) meta.push(`d. ${p.dod}`);
  return `
    <div class="${cls.join(' ')}" data-id="${p.id}" style="left:${POS[p.id].x}px;top:${POS[p.id].y}px">
      <div class="name">${p.name}</div>
      <div class="meta">${meta.length ? meta.join('<span class="dash">·</span>') : '<em style="opacity:.5">no record</em>'}</div>
    </div>`;
}

// Render the desktop tree
function renderDesktop() {
  // Generation rail labels
  let railHTML = '';
  for (let g = 0; g < 5; g++) {
    const y = LAYOUT.topPad + (4 - g) * LAYOUT.rowGap + LAYOUT.cardH/2;
    railHTML += `<div class="gen-label" style="top:${y}px"><span class="num">${GEN_LABELS[g].num}</span>${GEN_LABELS[g].label}</div>`;
    railHTML += `<div class="gen-line" style="top:${y}px"></div>`;
  }
  const railDiv = document.createElement('div');
  railDiv.className = 'gen-rail';
  railDiv.innerHTML = railHTML;
  canvas.appendChild(railDiv);

  // Cards for everyone with a POS
  let cards = '';
  PEOPLE.forEach(p => {
    if (POS[p.id]) cards += cardHTML(p);
  });

  // Siblings cluster (Joanne's brothers) — to the right of Kieran
  const sibs = PEOPLE.filter(p => p.role === 'sibling');
  const kieranPos = POS['kieran'];
  const sibsBox = {
    x: kieranPos.x + LAYOUT.cardW + 30,
    y: kieranPos.y - 8,
    w: 230,
  };
  let sibsHTML = `
    <div class="siblings line-daly" data-cluster="siblings" style="left:${sibsBox.x}px;top:${sibsBox.y}px;width:${sibsBox.w}px">
      <div class="title">Joanne's brothers</div>
      <div class="chips">
        ${sibs.map(s => `<div class="chip line-daly" data-id="${s.id}">${s.name.split(' ')[0]} <span style="font-family:ui-monospace,monospace;font-size:10px;color:var(--ink-soft)">${s.dob||''}</span></div>`).join('')}
      </div>
    </div>`;

  // Uncles cluster (paternal — Daly) above/beside John Daly
  const dalyUncles = PEOPLE.filter(p => (p.role === 'uncle' || p.role === 'aunt') && p.parentOf === 'john_daly');
  const johnPos = POS['john_daly'];
  const dalyBox = {
    x: johnPos.x - 270,
    y: johnPos.y + 4,
    w: 250,
  };
  let dalyUnclesHTML = `
    <div class="siblings line-daly" style="left:${dalyBox.x}px;top:${dalyBox.y}px;width:${dalyBox.w}px">
      <div class="title">Paternal uncles &amp; aunts</div>
      <div class="chips">
        ${dalyUncles.map(s => `<div class="chip line-daly" data-id="${s.id}">${s.name.replace(' Daly','')}</div>`).join('')}
      </div>
    </div>`;

  // Byron aunts & uncles — beside Joan Byron
  const byronAunts = PEOPLE.filter(p => (p.role === 'uncle' || p.role === 'aunt') && p.parentOf === 'joan_byron');
  const joanPos = POS['joan_byron'];
  const byronBox = {
    x: joanPos.x + LAYOUT.cardW + 28,
    y: joanPos.y + 4,
    w: 280,
  };
  let byronAuntsHTML = `
    <div class="siblings line-byron" style="left:${byronBox.x}px;top:${byronBox.y}px;width:${byronBox.w}px">
      <div class="title">Maternal aunts &amp; uncles</div>
      <div class="chips">
        ${byronAunts.map(s => `<div class="chip line-byron" data-id="${s.id}">${s.name.replace(' Byron','')}</div>`).join('')}
      </div>
    </div>`;

  // Great-uncle (Matthew Daly) — Michael Daly's elder brother
  const gUncles = PEOPLE.filter(p => p.role === 'great-uncle' && p.parentOf === 'gp_michael_daly');
  const michaelPos = POS['gp_michael_daly'];
  const gUncleBox = {
    x: michaelPos.x - 200,
    y: michaelPos.y + 4,
    w: 180,
  };
  let gUnclesHTML = '';
  if (gUncles.length) {
    gUnclesHTML = `
      <div class="siblings line-daly" style="left:${gUncleBox.x}px;top:${gUncleBox.y}px;width:${gUncleBox.w}px">
        <div class="title">Great-uncle</div>
        <div class="chips">
          ${gUncles.map(s => {
            const bioCls = BIOS[s.id] ? ' has-bio-chip' : '';
            return `<div class="chip line-daly${bioCls}" data-id="${s.id}">${s.name.replace(' Daly','')}${BIOS[s.id] ? ' <span style="display:inline-block;width:5px;height:5px;background:var(--c-daly);border-radius:50%;margin-left:2px;vertical-align:2px"></span>' : ''}</div>`;
          }).join('')}
        </div>
      </div>`;
  }

  // Inject into canvas (after svg)
  const wrap = document.createElement('div');
  wrap.innerHTML = cards + sibsHTML + dalyUnclesHTML + byronAuntsHTML + gUnclesHTML;
  while (wrap.firstChild) canvas.appendChild(wrap.firstChild);

  drawConnectors();
  computeCanvasBounds();
  fitToScreen(true);
}

function drawConnectors() {
  // Determine bounding box first to set svg size
  let maxX = 0, maxY = 0;
  PEOPLE.forEach(p => {
    if (POS[p.id]) {
      maxX = Math.max(maxX, POS[p.id].x + LAYOUT.cardW);
      maxY = Math.max(maxY, POS[p.id].y + LAYOUT.cardH);
    }
  });
  maxX += 320; // siblings cluster
  maxY += 80;
  svg.setAttribute('width', maxX);
  svg.setAttribute('height', maxY);
  svg.setAttribute('viewBox', `0 0 ${maxX} ${maxY}`);

  let paths = '';
  // Couple connectors (dashed, horizontal)
  COUPLES.forEach(([a, b]) => {
    if (!POS[a] || !POS[b]) return;
    const aP = POS[a], bP = POS[b];
    const y = aP.y + LAYOUT.cardH/2;
    const x1 = aP.x + LAYOUT.cardW;
    const x2 = bP.x;
    paths += `<path class="couple" d="M ${x1} ${y} L ${x2} ${y}"/>`;
    // Marriage marker (rendered as DOM div below)
  });

  // Parent → child connectors (curved, solid)
  // Strategy: from couple midpoint at top of child's parent row, curve down to child's top
  Object.entries(PARENT_OF).forEach(([childId, parents]) => {
    if (!POS[childId]) return;
    const [pa, pb] = parents;
    if (!POS[pa] || !POS[pb]) return;
    const child = POS[childId];
    const a = POS[pa], b = POS[pb];
    const startX = (a.x + b.x + LAYOUT.cardW * 2) / 2; // midpoint between cards
    const startY = a.y + LAYOUT.cardH; // bottom of parent row
    const endX = child.x + LAYOUT.cardW / 2;
    const endY = child.y;
    const midY = (startY + endY) / 2;
    paths += `<path class="parent" d="M ${startX} ${startY} C ${startX} ${midY}, ${endX} ${midY}, ${endX} ${endY}"/>`;
  });

  // Siblings of Joanne all share John+Joan parents → already covered in PARENT_OF
  // But Joanne's siblings — we don't draw individual cards for them; they're chips.
  // So we draw a single bracket from John+Joan midpoint down to the siblings cluster top.
  const sibsClusterEl = null; // we'll get coords after DOM placement

  svg.innerHTML = paths;

  // Marriage markers (small dots between couple cards) as DOM (so they sit above svg)
  // Clear existing
  canvas.querySelectorAll('.marriage-marker').forEach(el => el.remove());
  COUPLES.forEach(([a, b]) => {
    if (!POS[a] || !POS[b]) return;
    const aP = POS[a], bP = POS[b];
    const midX = (aP.x + LAYOUT.cardW + bP.x) / 2;
    const midY = aP.y + LAYOUT.cardH/2;
    const dot = document.createElement('div');
    dot.className = 'marriage-marker';
    dot.style.left = `${midX}px`;
    dot.style.top = `${midY}px`;
    canvas.appendChild(dot);
  });
}

let CANVAS_BOUNDS = { w: 2000, h: 1000 };
function computeCanvasBounds() {
  let maxX = 0, maxY = 0;
  canvas.querySelectorAll('.card, .siblings').forEach(el => {
    const x = parseFloat(el.style.left) + el.offsetWidth;
    const y = parseFloat(el.style.top) + el.offsetHeight;
    if (x > maxX) maxX = x;
    if (y > maxY) maxY = y;
  });
  CANVAS_BOUNDS = { w: maxX + 60, h: maxY + 60 };
}

/* ============================================================
   ZOOM + PAN
   ============================================================ */
let view = { x: 0, y: 0, scale: 1 };
function applyView() {
  canvas.style.transform = `translate(${view.x}px, ${view.y}px) scale(${view.scale})`;
}
function fitToScreen(initial = false) {
  const sw = stage.clientWidth, sh = stage.clientHeight;
  const scaleX = sw / CANVAS_BOUNDS.w;
  const scaleY = sh / CANVAS_BOUNDS.h;
  let s = Math.min(scaleX, scaleY, 1);
  s = Math.max(s, 0.35);
  view.scale = s;
  view.x = (sw - CANVAS_BOUNDS.w * s) / 2;
  view.y = (sh - CANVAS_BOUNDS.h * s) / 2;
  applyView();
  if (initial) {
    const hint = document.getElementById('panHint');
    hint.classList.add('show');
    setTimeout(() => hint.classList.remove('show'), 2800);
  }
}
function zoomBy(factor, cx, cy) {
  const sw = stage.clientWidth, sh = stage.clientHeight;
  if (cx === undefined) { cx = sw / 2; cy = sh / 2; }
  const newScale = Math.min(2.4, Math.max(0.25, view.scale * factor));
  // zoom about pointer
  const wx = (cx - view.x) / view.scale;
  const wy = (cy - view.y) / view.scale;
  view.scale = newScale;
  view.x = cx - wx * newScale;
  view.y = cy - wy * newScale;
  applyView();
}

// Mouse pan
let dragging = false, dragStart = null;
stage.addEventListener('mousedown', (e) => {
  if (e.target.closest('.card') || e.target.closest('.chip')) return;
  dragging = true;
  stage.classList.add('grabbing');
  dragStart = { x: e.clientX - view.x, y: e.clientY - view.y };
});
window.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  view.x = e.clientX - dragStart.x;
  view.y = e.clientY - dragStart.y;
  applyView();
});
window.addEventListener('mouseup', () => {
  dragging = false;
  stage.classList.remove('grabbing');
});

// Wheel zoom
stage.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = stage.getBoundingClientRect();
  const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.12 : 1/1.12;
  zoomBy(factor, cx, cy);
}, { passive: false });

// Touch pinch + pan
let touchState = null;
stage.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    touchState = { mode: 'pan', startX: e.touches[0].clientX - view.x, startY: e.touches[0].clientY - view.y };
  } else if (e.touches.length === 2) {
    const [t1, t2] = e.touches;
    const dx = t2.clientX - t1.clientX, dy = t2.clientY - t1.clientY;
    const dist = Math.hypot(dx, dy);
    const cx = (t1.clientX + t2.clientX)/2, cy = (t1.clientY + t2.clientY)/2;
    touchState = { mode: 'pinch', startDist: dist, startScale: view.scale, cx, cy };
  }
}, { passive: true });
stage.addEventListener('touchmove', (e) => {
  if (!touchState) return;
  if (touchState.mode === 'pan' && e.touches.length === 1) {
    view.x = e.touches[0].clientX - touchState.startX;
    view.y = e.touches[0].clientY - touchState.startY;
    applyView();
  } else if (touchState.mode === 'pinch' && e.touches.length === 2) {
    const [t1, t2] = e.touches;
    const dx = t2.clientX - t1.clientX, dy = t2.clientY - t1.clientY;
    const dist = Math.hypot(dx, dy);
    const factor = dist / touchState.startDist;
    const targetScale = Math.min(2.4, Math.max(0.25, touchState.startScale * factor));
    const rect = stage.getBoundingClientRect();
    const cx = touchState.cx - rect.left, cy = touchState.cy - rect.top;
    const wx = (cx - view.x) / view.scale;
    const wy = (cy - view.y) / view.scale;
    view.scale = targetScale;
    view.x = cx - wx * targetScale;
    view.y = cy - wy * targetScale;
    applyView();
  }
}, { passive: true });
stage.addEventListener('touchend', () => { touchState = null; }, { passive: true });

// Toolbar
document.getElementById('zoomIn').addEventListener('click', () => zoomBy(1.2));
document.getElementById('zoomOut').addEventListener('click', () => zoomBy(1/1.2));
document.getElementById('zoomReset').addEventListener('click', () => fitToScreen());
window.addEventListener('resize', () => {
  if (window.innerWidth > 800) fitToScreen();
});

/* ============================================================
   SELECTION + PANEL
   ============================================================ */
const panel = document.getElementById('panel');
const scrim = document.getElementById('scrim');
function openPerson(id) {
  const p = BY_ID[id];
  if (!p) return;
  // Visual focus
  document.querySelectorAll('.card.focused').forEach(el => el.classList.remove('focused'));
  const cardEl = document.querySelector(`.card[data-id="${id}"]`);
  if (cardEl) cardEl.classList.add('focused');

  // Fill panel
  const line = LINES[p.line];
  panel.className = `panel show ${line.cssClass}`;
  const tag = document.getElementById('panelLineTag');
  tag.textContent = line.label;
  document.getElementById('panelName').textContent = p.name;
  const body = document.getElementById('panelBody');
  // Fields
  const fields = [];
  if (p.dob || p.dod) {
    let lspan = '';
    if (p.dob) lspan += `<span class="yr">b. ${p.dob}</span>`;
    if (p.dob && p.dod) lspan += `<span class="sep">—</span>`;
    if (p.dod) lspan += `<span class="yr">d. ${p.dod}</span>`;
    fields.push(`<div class="field"><div class="label">Lifespan</div><div class="val"><span class="lifespan">${lspan}</span></div></div>`);
  } else {
    fields.push(`<div class="field"><div class="label">Lifespan</div><div class="val muted">Dates unrecorded</div></div>`);
  }
  if (p.birthplace) {
    fields.push(`<div class="field"><div class="label">Birthplace</div><div class="val">${p.birthplace}</div></div>`);
  } else {
    fields.push(`<div class="field"><div class="label">Birthplace</div><div class="val muted">Unknown</div></div>`);
  }
  const bioField = BIOS[p.id]
    ? (() => {
        const paras = BIOS[p.id].map(t => `<p>${t}</p>`).join('');
        return `<div class="field bio"><div class="label">Biography</div><div class="val bio-body">${paras}</div></div>`;
      })()
    : '';
  const isMobile = window.innerWidth <= 800;
  if (isMobile && bioField) fields.push(bioField);

  fields.push(`<div class="field"><div class="label">Family line</div><div class="val">${line.label}</div></div>`);
  fields.push(`<div class="field relation"><div class="label">Relation to Joanne</div><div class="val">${p.relation || '—'}</div></div>`);

  if (!isMobile && bioField) fields.push(bioField);

  // Spouse
  const couple = COUPLES.find(c => c.includes(p.id));
  if (couple) {
    const otherId = couple[0] === p.id ? couple[1] : couple[0];
    const o = BY_ID[otherId];
    fields.push(`<div class="field"><div class="label">Married to</div><div class="val"><a href="#" class="link" data-id="${otherId}" style="color:var(--ink);text-decoration:underline;text-decoration-color:var(--rule);text-underline-offset:3px">${o.name}</a></div></div>`);
  }
  // Parents
  if (PARENT_OF[p.id]) {
    const ps = PARENT_OF[p.id].map(id => `<a href="#" class="link" data-id="${id}" style="color:var(--ink);text-decoration:underline;text-decoration-color:var(--rule);text-underline-offset:3px">${BY_ID[id].name}</a>`).join(' &amp; ');
    fields.push(`<div class="field"><div class="label">Parents</div><div class="val">${ps}</div></div>`);
  }

  body.innerHTML = fields.join('');
  body.scrollTop = 0;
  body.querySelectorAll('.link').forEach(a => {
    a.addEventListener('click', (e) => { e.preventDefault(); openPerson(a.dataset.id); });
  });
  scrim.classList.add('show');
  panel.setAttribute('aria-hidden', 'false');
}
function closePanel() {
  panel.classList.remove('show');
  scrim.classList.remove('show');
  panel.setAttribute('aria-hidden', 'true');
  document.querySelectorAll('.card.focused').forEach(el => el.classList.remove('focused'));
}
document.getElementById('panelClose').addEventListener('click', closePanel);
scrim.addEventListener('click', closePanel);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closePanel(); });

// Delegate clicks for cards & chips
function attachCardClicks(root) {
  root.addEventListener('click', (e) => {
    const cardEl = e.target.closest('.card');
    if (cardEl) { openPerson(cardEl.dataset.id); return; }
    const chipEl = e.target.closest('.chip, .mchip');
    if (chipEl && chipEl.dataset.id) { openPerson(chipEl.dataset.id); return; }
    const mcardEl = e.target.closest('.mcard');
    if (mcardEl) { openPerson(mcardEl.dataset.id); return; }
  });
}

/* ============================================================
   MOBILE RENDER
   ============================================================ */
function mobileHeaderOffset() {
  const topbar = document.querySelector('header.app');
  return topbar ? topbar.getBoundingClientRect().height + 10 : 72;
}

function openMobileGenSection(section, { scroll = true } = {}) {
  const mv = document.getElementById('mobileView');
  if (!mv || !section) return;
  mv.querySelectorAll('.gen-section').forEach(sec => {
    sec.classList.toggle('collapsed', sec !== section);
  });
  if (scroll) {
    requestAnimationFrame(() => {
      const top = section.getBoundingClientRect().top + window.scrollY - mobileHeaderOffset();
      window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
    });
  }
}

function renderMobile() {
  const mv = document.getElementById('mobileView');

    gnum: 'III', gname: 'Grandparents',

      ` : '';
      return `
        <div class="mlabel">Paternal</div>
        <div class="mcouple">${renderMCard('gp_michael_daly')}${renderMCard('gp_mary_curran')}<div class="between">— married —</div></div>
        <div class="mlabel" style="margin-top:14px">Maternal</div>
        <div class="mcouple">${renderMCard('gp_james_byron')}${renderMCard('gp_nora_barrett')}<div class="between">— married —</div></div>
        ${gUncleHTML}
      `;
    }
  });
  // Gen 3: Great-grandparents
  sections.push({
    gnum: 'IV', gname: 'Great-grandparents',
    content: () => {
      return `
        <div class="mlabel">Daly line</div>
        <div class="mcouple">${renderMCard('ggp_patrick_daly')}${renderMCard('ggp_mary_barry')}<div class="between">— married —</div></div>
        <div class="mlabel" style="margin-top:14px">Curran · McCarthy line</div>
        <div class="mcouple">${renderMCard('ggp_william_curran')}${renderMCard('ggp_thomasine_mcc')}<div class="between">— married —</div></div>
        <div class="mlabel" style="margin-top:14px">Byron line</div>
        <div class="mcouple">${renderMCard('ggp_frederick_byron')}${renderMCard('ggp_florence_ritchie')}<div class="between">— married —</div></div>

        <div class="mcouple">${renderMCard('ggp_george_barrett')}${renderMCard('ggp_margaret_scott')}<div class="between">— married —</div></div>

    gnum: 'V', gname: '2× Great-grandparents',
    content: () => {

        <div class="mcouple">${renderMCard('g4_mathew_daly')}${renderMCard('g4_mary_horgan')}<div class="between">— married —</div></div>

        <div class="mlabel" style="margin-top:14px">Barrett line</div>
        <div class="mcouple">${renderMCard('g4_joseph_barrett')}${renderMCard('g4_julia_crockett')}<div class="between">— married —</div></div>
        <div class="mlabel" style="margin-top:14px">Scott line</div>

  let html = '';
  sections.forEach((s, i) => {
    const collapsed = i === 0 ? '' : 'collapsed';
    html += `
      <div class="gen-section ${collapsed}" data-gen-section="${i}">

          <span class="gtitle">

  });
  mv.innerHTML = html;

  mv.querySelectorAll('.gen-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const section = btn.closest('.gen-section');
      const isOpen = !section.classList.contains('collapsed');
      if (isOpen) {
        section.classList.add('collapsed');
      } else {
        openMobileGenSection(section);
      }
    });
  });
}

function renderMCard(id) {
  const p = BY_ID[id];
  if (!p) return '';
  const meta = [];
  if (p.dob) meta.push(`b. ${p.dob}`);
  if (p.dod) meta.push(`d. ${p.dod}`);
  if (p.birthplace) meta.push(p.birthplace);
  const bioCls = BIOS[p.id] ? ' has-bio' : '';
  return `
    <div class="mcard line-${p.line}${bioCls}" data-id="${p.id}">
      <div class="name">${p.name}</div>
      <div class="meta">${meta.join(' · ') || 'no record'}</div>
    </div>`;
}

/* ============================================================
   SEARCH
   ============================================================ */
const searchInput = document.getElementById('searchInput');
const searchCount = document.getElementById('searchCount');
let searchTimer = null;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(runSearch, 80);
});
function runSearch() {
  const q = searchInput.value.trim().toLowerCase();
  // Clear current highlights
  document.querySelectorAll('.card.match, .card.dimmed, .mcard.match').forEach(el => {
    el.classList.remove('match', 'dimmed');
  });
  searchCount.textContent = '';
  if (!q) return;
  const matches = PEOPLE.filter(p => p.name.toLowerCase().includes(q));
  searchCount.textContent = `${matches.length} match${matches.length === 1 ? '' : 'es'}`;

  if (matches.length === 0) return;

  // Desktop highlight + dim others
  document.querySelectorAll('.card').forEach(el => {
    const id = el.dataset.id;
    if (matches.find(m => m.id === id)) {
      el.classList.add('match');
    } else {
      el.classList.add('dimmed');
    }
  });
  // Mobile
  document.querySelectorAll('.mcard, .mchip').forEach(el => {
    const id = el.dataset.id;
    if (id && matches.find(m => m.id === id)) {
      el.classList.add('match');
    }
  });

  // Scroll to first match
  if (matches.length > 0 && window.innerWidth > 800) {
    const first = matches[0];
    let pos = POS[first.id];
    if (pos) {
      const sw = stage.clientWidth, sh = stage.clientHeight;
      // Center the card with current scale
      view.x = sw/2 - (pos.x + LAYOUT.cardW/2) * view.scale;
      view.y = sh/2 - (pos.y + LAYOUT.cardH/2) * view.scale;
      applyView();
    }
  } else if (matches.length > 0 && window.innerWidth <= 800) {
    // Expand the section containing the first match and scroll to it
    const first = matches[0];
    const target = document.querySelector(`.mcard[data-id="${first.id}"], .mchip[data-id="${first.id}"]`);
    if (target) {
      const section = target.closest('.gen-section');
      if (section) {
        openMobileGenSection(section);
        setTimeout(() => {
          const top = target.getBoundingClientRect().top + window.scrollY - mobileHeaderOffset();
          window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
        }, 280);
      }
    }
  }
}

  renderDesktop();
  renderMobile();
  attachCardClicks(canvas);
  attachCardClicks(document.getElementById('mobileView'));

  // Open Joanne by default after a brief moment
  setTimeout(() => {
    // Don't auto-open; just leave clean
  }, 400);
}
init();
